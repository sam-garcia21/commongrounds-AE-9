{% extends 'base.html' %}

{% block content %}
<h2>Profile Update</h2>

<p>Username: {{ user.username }}</p>
<p>Current Role: {{ user.profile.role }}</p>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save Changes</button>
</form>
<hr>
<form action="{% url 'logout' %}" method="POST">
    {% csrf_token %}
    <button type="submit">Logout</button>
</form>

{% endblock %}
