{% extends 'base.html' %}


{% block content %}
    <h1>Events</h1>
    <ul>
        {% for event in object_list %}
        <li>
            <a href="{% url 'localevents:event-detail' event.pk %}">
                {{ event.title }}
            </a>
        </li>
        {% endfor %}
    </ul>
{% endblock %}
