{% extends "base.html" %}

{% block content %}

<h2>Merchandise Store</h2>

{% if user.is_authenticated and user.profile.role == "Market Seller" %}
    <a href="/merchstore/item/add">Add Product</a>
{% endif %}

<ul>
    {% for item in items %}
    <li>
        <a href="/merchstore/item/{{ item.id }}">
            {{ item.name }} - ${{ item.price }}
        </a>
    </li>
    {% endfor %}
</ul>

{% endblock %}
